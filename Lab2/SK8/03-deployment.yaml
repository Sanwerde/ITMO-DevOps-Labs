apiVersion: apps/v1
kind: Deployment
metadata:
 name: web-server
 namespace: my-app
spec:
 replicas: 2
 selector:
  matchLabels:
   app: web-server
 template:
  metadata:
   labels:
    app: web-server
  spec:
   containers:
    - name: nginx
      image: nginx:1.27-alpine
      ports:
      - containerPort: 80
      volumeMounts:
      - name: html-volume
        mountPath: /usr/share/nginx/html/index.html
        subPath: index.html
      resources:
       requests:
        memory: "64Mi"
        cpu: "100m"
       limits:
        memory: "128Mi"
        cpu: "250m"
   volumes:
   - name: html-volume
     configMap:
      name: hello