
services:
  web:
    image: nginx:1.25-alpine
    ports:
    - "80:80"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - net_isolated_web

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - net_isolated_db

networks:
  net_isolated_web:
    driver: bridge
  net_isolated_db:
    driver: bridge